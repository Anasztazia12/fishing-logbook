<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Fishing Logbook</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="register">
    <header class="topbar">
        <a class="brand" href="index.html">Fishing Logbook</a>
        <nav class="topnav" id="mainNav"></nav>
    </header>

    <main class="container auth-grid">
        <section class="card auth-card">
            <h1>Register</h1>
            <p>Create your personal fishing logbook account.</p>
            <form id="registerForm" class="stack">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" name="username" minlength="3" autocomplete="username" required>

                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" name="email" required>

                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" name="password" minlength="6" required>

                <button type="submit" class="btn btn-primary">Create account</button>
            </form>
            <p class="fine-print">Already registered? <a href="login.html">Login</a>.</p>
            <p id="registerMessage" class="message" aria-live="polite"></p>
        </section>
    </main>

    <script src="assets/js/app.js" defer></script>
</body>
</html>
