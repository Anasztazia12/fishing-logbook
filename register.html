<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Fishing Logbook</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="register">
    <header class="topbar">
        <a class="brand" href="index.html">Fishing Logbook</a>
        <nav class="topnav" id="mainNav"></nav>
    </header>

    <main class="container auth-grid">
        <section class="card auth-card">
            <h1>Register</h1>
            <p>Create your personal fishing logbook account.</p>
            <form id="registerForm" class="stack">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" name="username" minlength="3" autocomplete="username" required>

                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" name="email" required>

                <label for="registerPassword">Password</label>
                <div class="password-wrap">
                    <input
                        type="password"
                        id="registerPassword"
                        name="password"
                        minlength="8"
                        maxlength="20"
                        pattern="[A-Za-z0-9!@#$%^&*()_\-+=.?]+"
                        title="Use 8-20 characters. Include at least 1 letter and 1 number."
                        required
                    >
                    <button type="button" id="toggleRegisterPassword" class="password-toggle" aria-label="Show password" title="Show password">&#128065;</button>
                </div>
                <label for="registerPasswordAgain">Password again</label>
                <div class="password-wrap">
                    <input
                        type="password"
                        id="registerPasswordAgain"
                        name="passwordAgain"
                        minlength="8"
                        maxlength="20"
                        pattern="[A-Za-z0-9!@#$%^&*()_\-+=.?]+"
                        title="Repeat your password."
                        required
                    >
                    <button type="button" id="toggleRegisterPasswordAgain" class="password-toggle" aria-label="Show password" title="Show password">&#128065;</button>
                </div>
                <p id="registerPasswordHint" class="field-hint">Use 8-20 characters, at least 1 letter and 1 number. Allowed: A-Z a-z 0-9 ! @ # $ % ^ &amp; * ( ) _ - + = . ?</p>

                <button type="submit" class="btn btn-primary">Create account</button>
            </form>
            <p class="fine-print">Already registered? <a href="login.html">Login</a>.</p>
            <p id="registerMessage" class="message" aria-live="polite"></p>
        </section>
    </main>

    <script src="assets/js/app.js" defer></script>
</body>
</html>
