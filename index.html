<!DOCTYPE html>
<html lang="en">
<head>

    <title>Fishing Logbook</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="index">
    <header class="topbar">
        <a class="brand" href="index.html">Fishing Logbook</a>
        <div class="topbar-controls">
            <nav class="topnav" id="mainNav"></nav>
            <div id="topbarLangSwitch"></div>
        </div>
