<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Catch | Fishing Logbook</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="add-catch">
    <header class="topbar">
        <a class="brand" href="dashboard.html">Fishing Logbook</a>
        <nav class="topnav" id="mainNav"></nav>
    </header>

    <main class="container">
        <section class="card">
            <h1>Add new fishing experience</h1>
            <p>Save your full result: place, fish count, fish data, photos and notes.</p>
            <form id="catchForm" class="stack">
                <label for="catchDate">Date</label>
                <input type="date" id="catchDate" name="catchDate" required>

                <label for="placeName">Place name</label>
                <input type="text" id="placeName" name="placeName" placeholder="Example: Lake Balaton, North Shore">

                <label for="placeLink">Place link</label>
                <input type="url" id="placeLink" name="placeLink" placeholder="https://example.com/fishing-spot">

                <label for="mapsLink">Google Maps link</label>
                <input type="url" id="mapsLink" name="mapsLink" placeholder="https://maps.google.com/...">
                <p class="field-hint">You can type a place name, add a link, add a Google Maps link, or use all of them together.</p>

                <label for="fishCount">Caught fish count</label>
                <input type="number" id="fishCount" name="fishCount" min="0" required>

                <label for="waterTemp">Water temperature</label>
                <input type="number" id="waterTemp" name="waterTemp" min="-5" max="50" step="0.1" placeholder="18.5">

                <label for="weather">Weather</label>
                <input type="text" id="weather" name="weather" placeholder="Sunny, cloudy, windy...">

                <label for="baits">Baits used</label>
                <input type="text" id="baits" name="baits" placeholder="Bait type, brand, color...">

                <div class="card fish-block">
                    <div class="card-head">
                        <h2>Fish details (type + weight)</h2>
                        <button type="button" id="addFishRow" class="btn btn-success">Add fish row</button>
                    </div>
                    <div id="fishRows" class="stack"></div>
                </div>

                <label for="catchImages">Upload photos</label>
                <input type="file" id="catchImages" name="catchImages" accept="image/*" multiple>

                <label for="catchCamera">Take photo with phone camera</label>
                <input type="file" id="catchCamera" name="catchCamera" accept="image/*" capture="environment" multiple>
                <div id="imagePreview" class="image-preview"></div>

                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="5" placeholder="What happened on this fishing trip?"></textarea>

                <button type="submit" class="btn btn-primary">Save fishing result</button>
            </form>
            <p id="catchMessage" class="message" aria-live="polite"></p>
        </section>
    </main>

    <script src="assets/js/app.js" defer></script>
</body>
</html>
