<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places | Fishing Logbook</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="places">
    <header class="topbar">
        <a class="brand" href="dashboard.html">Fishing Logbook</a>
        <div class="topbar-controls">
            <nav class="topnav" id="mainNav"></nav>
            <div id="topbarLangSwitch"></div>
        </div>
    </header>

    <main class="container place-layout">
        <section class="card">
            <h1>Fishing places</h1>
            <p>Open any place to see all logs and details you wrote there.</p>
            <div id="placesList" class="list-grid"></div>
        </section>

        <section class="card">
            <h2 id="selectedPlaceTitle">Select a place</h2>
            <div id="placeCatches" class="list-grid"></div>
        </section>
    </main>

    <script src="assets/js/app.js" defer></script>
</body>
</html>
